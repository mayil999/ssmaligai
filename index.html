<script>
// ── Local storage ─────────────────────────────────────────────────────────────
const LS={
  get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};

// ── Login — WhatsApp OTP (phone numbers stored as SHA-256 hashes) ────────────
// Allowed number hashes (actual numbers never stored in code)
const ALLOWED_HASHES=[
  '82b0a9bae197863b2c13ab6fb5759c18cec6e94c4c89a5418a17c3083d4773ad',
  'ff528eca96bdeea75b5b20d32a2d2433eda2e2a9b2b78132c60c6aec7b389712'
];
let appStarted=false;
let currentOTP='';
let otpExpiry=0;
let verifiedPhone='';

async function hashStr(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function generateOTP(){
  return String(Math.floor(100000+Math.random()*900000));
}

async function sendOTP(){
  const phoneEl=document.getElementById('login-phone');
  const errEl=document.getElementById('err-phone');
  const phone=(phoneEl.value||'').trim().replace(/\D/g,'');
  if(phone.length!==10){errEl.textContent='\u274C Enter valid 10-digit number';return;}
  const hashed=await hashStr(phone);
  if(!ALLOWED_HASHES.includes(hashed)){
    errEl.textContent='\u274C Access denied. This number is not authorised.';
    return;
  }
  // Generate OTP
  currentOTP=generateOTP();
  otpExpiry=Date.now()+5*60*1000; // 5 min expiry
  verifiedPhone=phone;
  // Open WhatsApp with OTP message to self
  const msg=encodeURIComponent('Sri Sakthi Maligai Login OTP: '+currentOTP+' (valid 5 mins). Do not share.');
  const waURL='https://wa.me/91'+phone+'?text='+msg;
  window.open(waURL,'_blank');
  // Show OTP step
  document.getElementById('step-phone').style.display='none';
  document.getElementById('step-otp').style.display='block';
  document.getElementById('otp-instruction').textContent='OTP sent to +91 '+phone+' via WhatsApp ✅';
  document.getElementById('login-otp').focus();
  errEl.textContent='';
}

function verifyOTP(){
  const otpEl=document.getElementById('login-otp');
  const errEl=document.getElementById('err-otp');
  const entered=(otpEl.value||'').trim();
  if(!entered){errEl.textContent='\u274C Enter the OTP';return;}
  if(Date.now()>otpExpiry){
    errEl.textContent='\u274C OTP expired. Go back and try again.';
    currentOTP=''; return;
  }
  if(entered===currentOTP){
    const _today=new Date().toISOString().slice(0,10);
    LS.set('ssm_auth_date',_today);
    LS.set('ssm_auth_phone', verifiedPhone);
    document.getElementById('login-screen').style.display='none';
    currentOTP=''; // clear OTP after use
    if(!appStarted){appStarted=true;render();}
  } else {
    errEl.textContent='\u274C Wrong OTP. Try again.';
    otpEl.value=''; otpEl.focus();
  }
}

function goBack(){
  document.getElementById('step-otp').style.display='none';
  document.getElementById('step-phone').style.display='block';
  document.getElementById('login-phone').focus();
  currentOTP='';
}

function setupLogin(){
  // Wire up buttons
  const btnSend=document.getElementById('btn-send-otp');
  const btnVerify=document.getElementById('btn-verify-otp');
  const btnBack=document.getElementById('btn-back');
  const phoneInp=document.getElementById('login-phone');
  const otpInp=document.getElementById('login-otp');

  if(btnSend) btnSend.addEventListener('click', sendOTP);
  if(btnVerify) btnVerify.addEventListener('click', verifyOTP);
  if(btnBack) btnBack.addEventListener('click', goBack);
  if(phoneInp) phoneInp.addEventListener('keydown',e=>{if(e.key==='Enter') sendOTP();});
  if(otpInp) otpInp.addEventListener('keydown',e=>{if(e.key==='Enter') verifyOTP();});

  // Already logged in today? Skip login
  const today=new Date().toISOString().slice(0,10);
  if(LS.get('ssm_auth_date')===today){
    const ls=document.getElementById('login-screen');
    if(ls) ls.style.display='none';
    if(!appStarted){appStarted=true;render();}
  } else {
    if(phoneInp) setTimeout(()=>phoneInp.focus(),300);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function formatDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function displayDate(s){const[y,m,d]=s.split('-');return `${d} ${MONTHS[+m-1]} ${y}`;}
function financialYear(s){const[y,m]=s.split('-').map(Number);return m>=4?`${y}-${y+1}`:`${y-1}-${y}`;}
function monthKey(s){return s.slice(0,7);}
function emptyRows(){return Array.from({length:10},()=>({label:'',amount:''}))}
const PRESETS={
  cash_sales:   ['MILK','MAAVU','PAAL','WATER','SNACKS','EGG','','','',''],
  purchase_secondary: ['','','','','','','','','',''],
  expenditure:  ['PETROL','FOOD','SNACKS','MISC','','','','','','']
};
function getRows(tabKey, savedRows){
  const presets=PRESETS[tabKey]||[];
  // Merge: for each row, if saved label exists use it, else use preset
  return Array.from({length:10},(_,i)=>{
    const saved=(savedRows&&savedRows[i])||{label:'',amount:''};
    const label = saved.label !== undefined && saved.label !== '' ? saved.label : (presets[i]||'');
    return {label, amount:saved.amount||''};
  });
}
// Persist presets into saved data so labels are never lost on first amount entry
function ensurePresets(tabKey){
  const d=getDay(currentDate);
  const presets=PRESETS[tabKey]||[];
  const rows=d[tabKey]||[];
  let changed=false;
  const newRows=Array.from({length:10},(_,i)=>{
    const r=rows[i]||{label:'',amount:''};
    // Only fill if label is blank AND there's a preset for this row
    if(!r.label && presets[i]){changed=true;return{...r,label:presets[i]};}
    return r;
  });
  if(changed){
    // Save silently without triggering sync bar
    allData[currentDate]={...d,[tabKey]:newRows};
    LS.set('ssm_data',JSON.stringify(allData));
    // Sync to Firebase quietly
    if(window._fbSet) window._fbSet(allData).catch(()=>{});
  }
}

// Auto-seed prev day's 10s into today's putin_history if not yet done
function ensurePrevTensInPutin(dateToCheck){
  const target = dateToCheck || currentDate;
  const d = allData[target] || initDay();
  // Skip if today already has putin entries
  if((d.putin_history||[]).length > 0) return;
  // Get prev day's 10s value
  const prev = new Date(target);
  prev.setDate(prev.getDate() - 1);
  const prevStr = formatDate(prev);
  const prevDay = allData[prevStr];
  if(!prevDay) return; // prev day has no data at all
  const prevTens = parseFloat(prevDay.eod_tens||0)||0;
  if(prevTens <= 0) return;
  // Auto-save prev day 10s into today's Put In
  const updated = {...d, putin_history:[String(prevTens)]};
  allData[target] = updated;
  LS.set('ssm_data', JSON.stringify(allData));
  if(window._fbSet) window._fbSet(allData).catch(()=>{});
}

// Run for ALL dates that might need seeding (runs after data loaded)
function ensureAllDaysPutin(){
  Object.keys(allData).forEach(date=>{
    ensurePrevTensInPutin(date);
  });
  // Also check today even if not in allData yet
  ensurePrevTensInPutin(currentDate);
}
function initDay(){return{cash_sales:emptyRows(),purchase_secondary:emptyRows(),expenditure:emptyRows(),
  eod_tens:'',eod_500s:'',eod_qr:'',market_history:[],transfer_history:[],recharge_history:[],commission_history:[],printing_history:[],putin_history:[],out_history:[]};}
function sumRows(rows){return rows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);}
function fmtINR(v){return '\u20B9'+Number(v||0).toLocaleString('en-IN',{minimumFractionDigits:2});}
function prevDayTens(date){
  const prev=new Date(date); prev.setDate(prev.getDate()-1);
  const prevStr=formatDate(prev);
  return parseFloat((allData[prevStr]||{}).eod_tens||0)||0;
}

// ── State ─────────────────────────────────────────────────────────────────────
let allData={}, currentDate=formatDate(new Date()), activeTab=0, toastTimer=null, syncTimer=null;
const loc=LS.get('ssm_data'); if(loc){try{allData=JSON.parse(loc);}catch(e){}}
// After local load, seed any missing Put In values immediately
setTimeout(()=>{ ensureAllDaysPutin(); },100);

// ── Sync bar ──────────────────────────────────────────────────────────────────
function sbar(cls,msg,autohide=0){
  const b=document.getElementById('sbar');
  b.className=cls; b.textContent=msg;
  if(autohide) setTimeout(()=>{b.style.display='none';},autohide);
}

// ── Save: local + Firebase ────────────────────────────────────────────────────
function saveData(){
  LS.set('ssm_data',JSON.stringify(allData));
  clearTimeout(syncTimer);
  sbar('sb-syncing','⏳ Saving...');
  syncTimer=setTimeout(()=>{
    if(!window._fbSet){sbar('sb-offline','📵 Saved locally (no Firebase config)',4000);return;}
    window._fbSet(allData)
      .then(()=>sbar('sb-synced','✅ Synced to both devices',3000))
      .catch(()=>sbar('sb-offline','⚠ Saved locally — sync failed',4000));
  },800);
}

function getDay(date){return allData[date]||initDay();}
function setDay(date,updater){allData[date]=updater(allData[date]||initDay());saveData();}

// ── Firebase: listen for remote changes ──────────────────────────────────────
function startListen(){
  if(!window._fbListen)return;
  let firstCall=true;
  window._fbListen(remote=>{
    if(!remote) return;
    if(firstCall){
      firstCall=false;
      allData={...allData,...remote};
      LS.set('ssm_data',JSON.stringify(allData));
      ensureAllDaysPutin(); // auto-seed prev 10s into put in after data loaded
      renderTab(activeTab);
      sbar('sb-synced','✅ Connected & synced',3000);
      return;
    }
    allData={...allData,...remote};
    LS.set('ssm_data',JSON.stringify(allData));
    ensureAllDaysPutin();
    renderTab(activeTab);
    sbar('sb-synced','🔄 Updated from other device',3000);
  });
}
window.addEventListener('firebase-ready',()=>{
  startListen();
  sbar('sb-synced','✅ Firebase connected!',3000);
});
window.addEventListener('firebase-failed',()=>{
  sbar('sb-offline','⚠ Firebase not reachable. Check: 1) Internet on 2) Realtime Database created in Firebase console',0);
});
// timeout handled by firebase-failed event

// ── Calculations ──────────────────────────────────────────────────────────────
function calcDay(date){
  const d=getDay(date);
  const cs=sumRows(d.cash_sales),sp=sumRows(d.purchase_secondary),exp=sumRows(d.expenditure);
  const tr=(d.transfer_history||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const rc=(d.recharge_history||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const cm=(d.commission_history||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const pr=(d.printing_history||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const et=parseFloat(d.eod_tens)||0,e5=parseFloat(d.eod_500s)||0,eq=parseFloat(d.eod_qr)||0;
  const eo=(d.out_history||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const pi=(d.putin_history||[]).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const sales_val=et+e5+eq+eo+cs-cm-pi-pr;
  const profit=sales_val*0.20+cm+pr;
  return{cs,sp,exp,tr,rc,cm,pr,et,e5,eq,eo,pi,sales:sales_val,profit,purchase:cs+sp};
}
function calcAggregates(){
  const mk=monthKey(currentDate),fy=financialYear(currentDate);
  const[fyS]=fy.split('-').map(Number); const prevFY=`${fyS-1}-${fyS}`;
  const z=()=>({sales:0,purchase:0,expenditure:0,transfer:0,recharge:0,commission:0,printing:0,putin:0,profit:0});
  const fyMap={[fy]:z(),[prevFY]:z()}; const month=z();
  Object.keys(allData).forEach(date=>{
    const c=calcDay(date),dfy=financialYear(date);
    if(!fyMap[dfy])fyMap[dfy]=z();
    fyMap[dfy].sales+=c.sales;fyMap[dfy].purchase+=c.purchase;
    fyMap[dfy].expenditure+=c.exp;fyMap[dfy].transfer+=c.tr;fyMap[dfy].recharge+=c.rc;fyMap[dfy].commission+=c.cm;fyMap[dfy].printing+=c.pr;fyMap[dfy].profit+=c.profit;
    if(date.startsWith(mk)){month.sales+=c.sales;month.purchase+=c.purchase;month.expenditure+=c.exp;month.transfer+=c.tr;month.recharge+=c.rc;month.commission+=c.cm;month.printing+=c.pr;month.profit+=c.profit;}
  });
  return{month,currentFY:fyMap[fy],currentFYLabel:fy,pastFYs:Object.keys(fyMap).filter(f=>f!==fy).sort().reverse(),fyMap};
}

// ── XLSX Export: Monthly Summary + FY Summary only ───────────────────────────
function exportXLSX(){
  const XLSX=window.XLSX;if(!XLSX){showToast('XLSX not ready');return;}
  const wb=XLSX.utils.book_new(),dates=Object.keys(allData).sort();
  const hdr=['Sales','Purchase','Expenditure','Transfer','Recharge','Commission'];

  // ── Sheet 1: Monthly Summary ──────────────────────────────────────────────
  const mm={};
  dates.forEach(date=>{
    const mk=monthKey(date),c=calcDay(date);
    if(!mm[mk])mm[mk]={sales:0,purchase:0,expenditure:0,transfer:0,recharge:0,commission:0};
    mm[mk].sales+=c.sales;mm[mk].purchase+=c.purchase;mm[mk].expenditure+=c.exp;
    mm[mk].transfer+=c.tr;mm[mk].recharge+=c.rc;mm[mk].commission+=c.cm;
  });
  const moRows=Object.keys(mm).sort().map(k=>{const m=mm[k];return[k,m.sales,m.purchase,m.expenditure,m.transfer,m.recharge,m.commission];});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Month',...hdr],...moRows]),'Monthly Summary');

  // ── Sheet 2: Financial Year Summary ──────────────────────────────────────
  const fy={};
  dates.forEach(date=>{
    const fyKey=financialYear(date),c=calcDay(date);
    if(!fy[fyKey])fy[fyKey]={sales:0,purchase:0,expenditure:0,transfer:0,recharge:0,commission:0};
    fy[fyKey].sales+=c.sales;fy[fyKey].purchase+=c.purchase;fy[fyKey].expenditure+=c.exp;
    fy[fyKey].transfer+=c.tr;fy[fyKey].recharge+=c.rc;fy[fyKey].commission+=c.cm;
  });
  const fyRows=Object.keys(fy).sort().map(k=>{const f=fy[k];return[k,f.sales,f.purchase,f.expenditure,f.transfer,f.recharge,f.commission];});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Financial Year',...hdr],...fyRows]),'FY Summary');

  XLSX.writeFile(wb,`SriSakthiMaligai_${formatDate(new Date())}.xlsx`);
  showToast('\u2705 Excel exported!');
}

// ── UI ────────────────────────────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.style.display='none';},2400);}
function el(tag,attrs,...ch){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null)e.append(typeof c==='string'?c:c);});
  return e;
}
function card(label,value,color,note){
  const d=el('div',{style:{background:'#fff',borderRadius:'10px',padding:'12px 14px',boxShadow:'0 1px 6px rgba(0,0,0,0.06)',borderLeft:`4px solid ${color}`,marginBottom:'8px'}},

    el('div',{style:{fontSize:'20px',fontWeight:'800',color,marginTop:'2px'}},fmtINR(value))
  );
  if(note)d.append(el('div',{style:{fontSize:'10px',color:'#aaa',marginTop:'2px'}},note));
  return d;
}
function profitCard(label,value){
  return el('div',{style:{background:'linear-gradient(135deg,#e8f5e9,#c8e6c9)',borderRadius:'10px',
    padding:'12px 14px',boxShadow:'0 2px 8px rgba(46,125,50,0.15)',border:'2px solid #4caf50',

function secHdr(t,c){return el('div',{style:{fontSize:'13px',fontWeight:'800',color:c,borderBottom:`2px solid ${c}`,paddingBottom:'4px',marginBottom:'10px',textTransform:'uppercase',letterSpacing:'0.5px',marginTop:'18px'}},t);}
function lbl(t,c='#555'){return el('label',{style:{fontSize:'11px',fontWeight:'700',color:c,display:'block',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.5px'}},t);}
function tbar(id,val,bg,bc,c){return el('div',{id,style:{marginTop:'10px',background:bg,borderLeft:`4px solid ${bc}`,padding:'9px 14px',borderRadius:'0 8px 8px 0',fontWeight:'800',color:c,fontSize:'15px'}},'Total: '+fmtINR(val));}
function sbtn(label,onClick,c='#1a73e8'){return el('button',{style:{marginTop:'14px',padding:'12px',background:`linear-gradient(135deg,${c},${c}cc)`,color:'#fff',border:'none',borderRadius:'8px',fontSize:'15px',fontWeight:'700',cursor:'pointer',width:'100%'},onClick},label);}
function buildTbl(tabKey){
  const day=getDay(currentDate),rows=getRows(tabKey,day[tabKey]);
  const wrap=el('div',{style:{overflowX:'auto'}});
  const tbl=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'14px'}});
  tbl.append(el('thead',null,el('tr',{style:{background:'#1a73e8',color:'#fff'}},
    el('th',{style:{padding:'8px 6px',textAlign:'left',width:'50%'}},'Description'),
    el('th',{style:{padding:'8px 6px',textAlign:'left',width:'50%'}},'Amount (\u20B9)')
  )));
  const tbody=el('tbody');
  rows.forEach((row,i)=>{
    const tr=el('tr',{style:{background:i%2===0?'#f8fbff':'#fff'}});
    const li=el('input',{type:'text',placeholder:`Item ${i+1}`,value:row.label,style:{width:'100%',padding:'7px 8px',border:'1px solid #d0d7e3',borderRadius:'6px',fontSize:'13px',background:'#fff',boxSizing:'border-box'}});
    li.addEventListener('input',e=>{setDay(currentDate,d=>{const r=[...d[tabKey]];r[i]={...r[i],label:e.target.value};return{...d,[tabKey]:r};});});
    const ai=el('input',{type:'number',placeholder:'0.00',value:row.amount,min:'0',step:'0.01',style:{width:'100%',padding:'7px 8px',border:'1px solid #d0d7e3',borderRadius:'6px',fontSize:'13px',background:'#fff',boxSizing:'border-box'}});
    ai.addEventListener('input',e=>{
      setDay(currentDate,d=>{const r=[...d[tabKey]];r[i]={...r[i],amount:e.target.value};return{...d,[tabKey]:r};});
      const b=document.getElementById('tb-'+tabKey);if(b)b.textContent='Total: '+fmtINR(sumRows(getDay(currentDate)[tabKey]));
    });
    tr.append(el('td',{style:{padding:'4px'}},li),el('td',{style:{padding:'4px'}},ai));
    tbody.append(tr);
  });
  tbl.append(tbody);wrap.append(tbl);return wrap;
}

// ── Tab renderers ─────────────────────────────────────────────────────────────
function renderTab(idx){
  const cont=document.getElementById('tab-content');if(!cont)return;
  cont.innerHTML='';cont.className='tab-content';
  const day=getDay(currentDate);

  if(idx===0){
    ensurePresets('cash_sales');
    cont.append(
      el('div',{style:{fontSize:'15px',fontWeight:'800',color:'#1a73e8',marginBottom:'8px',paddingBottom:'6px',borderBottom:'2px solid #1a73e820'}},"Purchase in Sales Cash"),
      buildTbl('cash_sales'),tbar('tb-cash_sales',sumRows(day.cash_sales),'#e8f0fe','#1a73e8','#1a73e8'),
      sbtn('\u2713 Save Cash Sales',()=>showToast('\u2705 Cash Sales saved!'))
    );
  }
  else if(idx===1){
    ensurePresets('purchase_secondary');
    const mktHist=(day.market_history||[]);
    const mktTotal=mktHist.reduce((s,v)=>s+(parseFloat(v)||0),0);
    let _mkt='';

      const x=el('button',{style:{background:'none',border:'none',color:'#bbb',cursor:'pointer',fontSize:'13px',padding:'0 3px'},
        onClick:()=>{setDay(currentDate,d=>{const h=[...(d.market_history||[])];h.splice(i,1);return{...d,market_history:h};});renderTab(1);}
      },'\u00D7');

        border:'1.5px solid #ce93d8',borderRadius:'20px',padding:'2px 4px 2px 8px'}},ci,x));
    });
    const mktInp=el('input',{type:'number',placeholder:'0.00',style:{flex:'1',padding:'9px 10px',
      border:'2px solid #ce93d8',borderRadius:'8px',fontSize:'15px',background:'#f3e5f5',boxSizing:'border-box',fontWeight:'600'}});

        el('div',{style:{fontSize:'13px',fontWeight:'800',color:'#7b1fa2'}},'MARKET'),
        mktHist.length>0?el('div',{style:{fontSize:'13px',fontWeight:'900',color:'#7b1fa2'}},'\u20B9'+mktTotal.toLocaleString('en-IN')):el('span',null)

    if(mktChips.children.length>0) mktBox.append(mktChips);
    mktBox.append(el('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},mktInp,

    );
  }
  else if(idx===2){
    // ── Card-based service entry builder ─────────────────────────────────────

        : null;
      const wrap=el('div',{style:{background:'#fff',border:`1.5px solid ${bc}`,borderRadius:'12px',

    );

  else if(idx===3){
    ensurePresets('expenditure');

      el('div',{style:{fontSize:'15px',fontWeight:'800',color:'#e65100',marginBottom:'8px',paddingBottom:'6px',borderBottom:'2px solid #e6510020'}},'Expenditure'),

    const c=calcDay(currentDate),agg=calcAggregates();

    // ── Helper: clean card-style cumulative section for EOD ─────────────────

      const addBtn=el('button',{

      el('div',{style:{fontSize:'11px',color:'#555',background:'#f1f8e9',border:'1px solid #c5e1a5',borderRadius:'8px',padding:'8px 12px',marginBottom:'14px',lineHeight:'1.7'}},

      secHdr(`Today \u2014 ${displayDate(currentDate)}`,'#2e7d32'),

      card("Today's Commission",c.cm,'#c62828','subtracted from sales'),
      card("Today's Printing",c.pr,'#6a1b9a','subtracted from sales'),
      card("Today's Money Transfer",c.tr,'#0097a7'),card("Today's Recharge",c.rc,'#7b1fa2'),
      profitCard("Today's Profit",c.profit),

      secHdr(`Month \u2014 ${monthKey(currentDate)}`,'#0d47a1'),
      card('Monthly Sales',agg.month.sales,'#2e7d32'),card('Monthly Purchase',agg.month.purchase,'#1a73e8'),
      card('Monthly Expenditure',agg.month.expenditure,'#e65100'),card('Monthly Commission',agg.month.commission,'#c62828'),
      card('Monthly Printing',agg.month.printing,'#6a1b9a'),
      card('Monthly Transfer',agg.month.transfer,'#0097a7'),card('Monthly Recharge',agg.month.recharge,'#7b1fa2'),

      secHdr(`Current FY \u2014 ${agg.currentFYLabel}`,'#6a1b9a'),

    );
  }
  // ── Tab 5: Things to Purchase ─────────────────────────────────────────────
  else if(idx===5){
    const list=day.purchase_list||[];
    let _item='';
    const itemsEl=el('div',{style:{marginBottom:'12px'}});
    if(list.length===0){

        });
        itemsEl.append(el('div',{style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'6px',
          padding:'6px 8px',background:isDone?'#f9f9f9':i%2===0?'#fffde7':'#fff',borderRadius:'8px',
          border:'1px solid '+(isDone?'#eee':'#fff9c4')}},chk,inp,delBtn));
      });
    }
    const doneCount=list.filter(v=>v.startsWith('\u2713 ')).length;
    const newInp=el('input',{type:'text',placeholder:'Type item and press Enter or + Add...',
      style:{flex:'1',padding:'10px 12px',border:'2px solid #ffe082',borderRadius:'8px',
        fontSize:'14px',background:'#fffde7',boxSizing:'border-box'}});
    newInp.addEventListener('input',e=>{_item=e.target.value;});
    newInp.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&_item.trim()){
        setDay(currentDate,d=>({...d,purchase_list:[...(d.purchase_list||[]),_item.trim()]}));
        newInp.value='';_item='';showToast('\u2705 Item added!');renderTab(5);
      }
    });
    cont.append(
      el('div',{style:{fontSize:'15px',fontWeight:'800',color:'#f57f17',marginBottom:'4px',paddingBottom:'6px',borderBottom:'2px solid #ffe08240'}},'Things to Purchase \uD83D\uDED2'),
      el('div',{style:{fontSize:'12px',color:'#888',marginBottom:'12px'}},
        list.length+' item'+(list.length!==1?'s':'')+
        (list.length>0?' \u2022 '+doneCount+' done \u2022 '+(list.length-doneCount)+' pending':'')+
        ' \u2014 tap to edit, \u2713 checkbox = done'),
      itemsEl,
      el('div',{style:{display:'flex',gap:'8px',alignItems:'center'}},
        newInp,
        el('button',{
          style:{padding:'10px 16px',background:'linear-gradient(135deg,#f57f17,#e65100)',
            color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer',whiteSpace:'nowrap'},
          onClick:()=>{
            if(!_item.trim()){showToast('Enter an item name');return;}
            setDay(currentDate,d=>({...d,purchase_list:[...(d.purchase_list||[]),_item.trim()]}));
            newInp.value='';_item='';showToast('\u2705 Item added!');renderTab(5);
          }
        },'+ Add')
      ),
      ...(doneCount>0 ? [el('button',{
        style:{marginTop:'10px',width:'100%',padding:'9px',background:'#ffebee',color:'#c62828',
          border:'1px solid #ffcdd2',borderRadius:'8px',fontSize:'12px',fontWeight:'700',cursor:'pointer'},
        onClick:()=>{
          setDay(currentDate,d=>({...d,purchase_list:(d.purchase_list||[]).filter(v=>!v.startsWith('\u2713 '))}));
          renderTab(5);showToast('Done items cleared');
        }
      },'\uD83D\uDDD1 Clear Done Items')] : [])
    );
  }
}

// ── Shell ─────────────────────────────────────────────────────────────────────
const TABS=[{s:'Purchase in Sales'},{s:'Purchase'},{s:'Service'},{s:'Expense'},{s:'EOD'},{s:'To Buy'}];
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  const hdr=el('div',{style:{background:'linear-gradient(135deg,#1a73e8,#0d47a1)',color:'#fff',padding:'14px 16px 12px',position:'sticky',top:'0',zIndex:'100',boxShadow:'0 2px 8px rgba(0,0,0,0.18)'}},
    el('div',{style:{fontSize:'20px',fontWeight:'900',letterSpacing:'1.5px',textAlign:'center',textTransform:'uppercase',textShadow:'0 1px 4px rgba(0,0,0,0.2)',marginBottom:'8px'}},'Sri Sakthi Maligai'),
    el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
      el('button',{style:{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',fontSize:'26px',width:'38px',height:'38px',borderRadius:'50%',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:'0'},
        onClick:()=>{const d=new Date(currentDate);d.setDate(d.getDate()-1);currentDate=formatDate(d);render();}},'\u2039'),
      el('div',{style:{textAlign:'center'}},
        el('div',{style:{fontSize:'17px',fontWeight:'800'}},displayDate(currentDate)),
        currentDate===formatDate(new Date())?el('div',{style:{fontSize:'10px',background:'rgba(255,255,255,0.2)',borderRadius:'10px',padding:'1px 10px',display:'inline-block',marginTop:'2px'}},'TODAY'):null
      ),
      el('button',{style:{background:currentDate===formatDate(new Date())?'transparent':'rgba(255,255,255,0.2)',border:'none',color:'#fff',fontSize:'26px',width:'38px',height:'38px',borderRadius:'50%',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:'0'},
        onClick:()=>{if(currentDate===formatDate(new Date()))return;const d=new Date(currentDate);d.setDate(d.getDate()+1);currentDate=formatDate(d);render();}},currentDate===formatDate(new Date())?'':'\u203a')
    )
  );
  const tabBar=el('div',{style:{display:'flex',background:'#fff',borderBottom:'2px solid #e0e8f7',overflowX:'auto',position:'sticky',top:'88px',zIndex:'99'}});
  TABS.forEach((tab,i)=>{
    tabBar.append(el('button',{
      style:{flex:'0 0 auto',padding:'11px 12px',border:'none',background:'none',fontSize:'12px',
        fontWeight:i===activeTab?'800':'500',color:i===activeTab?'#1a73e8':'#666',
        borderBottom:i===activeTab?'3px solid #1a73e8':'3px solid transparent',cursor:'pointer',whiteSpace:'nowrap'},
      onClick:()=>{activeTab=i;renderTabsOnly();}
    },tab.s));
  });
  const cw=el('div',{style:{padding:'14px 12px 100px'}},el('div',{id:'tab-content'}));
  const toast=el('div',{id:'toast',style:{display:'none',position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'#323232',color:'#fff',padding:'10px 22px',borderRadius:'24px',fontSize:'13px',fontWeight:'600',zIndex:'999',boxShadow:'0 4px 16px rgba(0,0,0,0.25)',whiteSpace:'nowrap'}});
  app.append(hdr,tabBar,cw,toast);
  renderTab(activeTab);
}
function renderTabsOnly(){
  document.querySelectorAll('#app > div:nth-child(2) button').forEach((b,i)=>{
    b.style.fontWeight=i===activeTab?'800':'500';
    b.style.color=i===activeTab?'#1a73e8':'#666';
    b.style.borderBottom=i===activeTab?'3px solid #1a73e8':'3px solid transparent';
  });
  renderTab(activeTab);
}
// Start — all functions now defined
setupLogin();
</script>
